<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-Shirt Quote Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input[type="text"],
        select,
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #764ba2;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            border: none;
        }

        .quote-count {
            min-width: 50px;
            text-align: center;
            font-weight: 600;
            color: #667eea;
            font-size: 16px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            display: none;
            margin: 20px 0;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #e0e0e0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .quotes-section {
            display: none;
        }

        .quotes-header {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }

        .quotes-list {
            list-style: none;
        }

        .quote-item {
            background: #f8f9ff;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .quote-text {
            flex: 1;
            color: #333;
            line-height: 1.5;
            font-size: 15px;
        }

        .quote-number {
            color: #667eea;
            font-weight: 600;
            min-width: 25px;
            text-align: center;
        }

        .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            white-space: nowrap;
            transition: background 0.3s;
        }

        .copy-btn:hover {
            background: #764ba2;
        }

        .copy-btn.copied {
            background: #4caf50;
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #c62828;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            border-left: 4px solid #4caf50;
        }

        .security-notice {
            background: #e3f2fd;
            color: #1565c0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            border-left: 4px solid #1976d2;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .quote-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .copy-btn {
                align-self: flex-end;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 T-Shirt Quote Generator</h1>
        <p class="subtitle">Generate unique, AI-powered quotes for your designs</p>

        <div class="security-notice">
            ℹ️ API calls are made securely from your device. No keys are exposed.
        </div>

        <div class="error" id="error"></div>
        <div class="success-message" id="success"></div>

        <div class="form-group">
            <label for="apiKey">OpenAI API Key (stored locally, not shared):</label>
            <input 
                type="password" 
                id="apiKey" 
                placeholder="sk-proj-..."
                autocomplete="off"
            >
            <small style="color: #666; margin-top: 5px; display: block;">Your key is only used in your browser, never sent to anyone.</small>
        </div>

        <div class="form-group">
            <label for="niche">Select Niche (or Enter Custom):</label>
            <input 
                type="text" 
                id="niche" 
                placeholder="e.g., hunting, fishing, dogs, yoga, coffee, gaming, travel"
                autocomplete="off"
            >
        </div>

        <div class="form-group">
            <label>Number of Quotes:</label>
            <div class="slider-container">
                <input 
                    type="range" 
                    id="quoteCount" 
                    min="1" 
                    max="20" 
                    value="10"
                >
                <span class="quote-count" id="countDisplay">10</span>
            </div>
        </div>

        <div class="button-group">
            <button class="btn-generate" id="generateBtn">Generate Quotes</button>
            <button class="btn-clear" id="clearBtn">Clear</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            Generating unique quotes...
        </div>

        <div class="quotes-section" id="quotesSection">
            <div class="quotes-header" id="quotesHeader"></div>
            <ul class="quotes-list" id="quotesList"></ul>
        </div>
    </div>

    <script>
        // Generate quotes using OpenAI API
        async function generateQuotes() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const niche = document.getElementById('niche').value.trim();
            const count = parseInt(document.getElementById('quoteCount').value);

            if (!apiKey) {
                showError('Please enter your OpenAI API key');
                return;
            }

            if (!niche) {
                showError('Please enter a niche');
                return;
            }

            clearMessages();
            showLoading(true);
            document.getElementById('generateBtn').disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${apiKey}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: 'gpt-4',
                        messages: [
                            {
                                role: 'system',
                                content: 'You are a creative t-shirt designer who comes up with unique, witty quotes for print-on-demand designs.'
                            },
                            {
                                role: 'user',
                                content: `Generate ${count} unique, creative, and catchy t-shirt quotes/puns for the '${niche}' niche.

Requirements:
- Each quote should be original and never seen before
- Perfect for print-on-demand t-shirt designs
- Funny, witty, or clever
- Between 5-15 words each
- No quotes should repeat
- One quote per line

Format: Just the quotes, numbered 1-${count}`
                            }
                        ],
                        temperature: 0.9,
                        max_tokens: 1000
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || `API Error: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.error) {
                    showError(`API Error: ${data.error.message}`);
                    return;
                }

                const content = data.choices[0].message.content;
                const quotes = parseQuotes(content);

                if (quotes.length === 0) {
                    showError('No quotes generated. Please try again.');
                    return;
                }

                displayQuotes(niche, quotes);
                showSuccess(`Generated ${quotes.length} unique quotes!`);

            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                showLoading(false);
                document.getElementById('generateBtn').disabled = false;
            }
        }

        function parseQuotes(content) {
            const lines = content.split('\n');
            const quotes = [];

            for (let line of lines) {
                line = line.trim();
                if (line && line.length > 5 && !line.startsWith('#')) {
                    line = line.replace(/^\d+\.\s*/, '').replace(/^["']|["']$/g, '');
                    if (line.length > 5) {
                        quotes.push(line);
                    }
                }
            }

            return quotes;
        }

        function displayQuotes(niche, quotes) {
            const section = document.getElementById('quotesSection');
            const header = document.getElementById('quotesHeader');
            const list = document.getElementById('quotesList');

            header.textContent = `Fresh Quotes for "${niche.toUpperCase()}" (${quotes.length} total)`;
            list.innerHTML = '';

            quotes.forEach((quote, index) => {
                const li = document.createElement('li');
                li.className = 'quote-item';
                li.innerHTML = `
                    <span class="quote-number">${index + 1}</span>
                    <span class="quote-text">${escapeHtml(quote)}</span>
                    <button class="copy-btn" onclick="copyQuote(this, '${escapeHtml(quote).replace(/'/g, "\\'")}')">Copy</button>
                `;
                list.appendChild(li);
            });

            section.style.display = 'block';
        }

        function copyQuote(button, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = button.textContent;
                button.textContent = 'Copied!';
                button.classList.add('copied');

                setTimeout(() => {
                    button.textContent = originalText;
                    button.classList.remove('copied');
                }, 2000);
            });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const error = document.getElementById('error');
            error.textContent = message;
            error.style.display = 'block';
        }

        function showSuccess(message) {
            const success = document.getElementById('success');
            success.textContent = message;
            success.style.display = 'block';
        }

        function clearMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        // Event listeners
        document.getElementById('generateBtn').addEventListener('click', generateQuotes);

        document.getElementById('clearBtn').addEventListener('click', () => {
            document.getElementById('niche').value = '';
            document.getElementById('quotesSection').style.display = 'none';
            clearMessages();
        });

        document.getElementById('quoteCount').addEventListener('input', (e) => {
            document.getElementById('countDisplay').textContent = e.target.value;
        });

        document.getElementById('niche').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                generateQuotes();
            }
        });

        document.getElementById('apiKey').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('niche').focus();
            }
        });
    </script>
</body>
</html>
